<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perbandingan Senilai - MATH TUTORING by Deni</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config={theme:{extend:{fontFamily:{display:['Space Grotesk','sans-serif'],body:['DM Sans','sans-serif']},colors:{navy:{950:'#060e1a',900:'#0a1628',800:'#0f1d2f',700:'#152a42',600:'#1e3a5f',500:'#2a4f7a'},amber:{400:'#fbbf24',500:'#f59e0b',600:'#d97706'},emerald:{400:'#34d399',500:'#10b981',600:'#059669'}}}}}
</script>
<style>
/* === BASE === */
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:#060e1a;color:#e2e8f0;overflow-x:hidden;min-height:100vh}
h1,h2,h3,h4,h5{font-family:'Space Grotesk',sans-serif}
::selection{background:rgba(245,158,11,.3);color:#fff}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:#0a1628}
::-webkit-scrollbar-thumb{background:#1e3a5f;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#2a4f7a}

/* === HEADER === */
.app-header{position:fixed;top:0;left:0;right:0;z-index:100;height:60px;background:rgba(6,14,26,.92);backdrop-filter:blur(16px);border-bottom:1px solid rgba(30,58,95,.5);display:flex;align-items:center;justify-content:space-between;padding:0 20px}
.app-header .logo{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:15px;color:#f59e0b;letter-spacing:-.3px;white-space:nowrap}
.app-header .logo span{color:#e2e8f0;font-weight:400}
.app-header .topic-badge{background:rgba(245,158,11,.12);border:1px solid rgba(245,158,11,.25);color:#fbbf24;font-size:12px;font-weight:600;padding:4px 14px;border-radius:20px;white-space:nowrap}
.header-btn{background:rgba(30,58,95,.4);border:1px solid rgba(30,58,95,.6);color:#94a3b8;font-size:13px;font-weight:500;padding:6px 14px;border-radius:8px;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif}
.header-btn:hover{background:rgba(30,58,95,.7);color:#e2e8f0}

/* === MODAL === */
.modal-overlay{position:fixed;inset:0;z-index:200;background:rgba(6,14,26,.8);backdrop-filter:blur(6px);display:none;align-items:center;justify-content:center;padding:20px}
.modal-overlay.active{display:flex}
.modal-box{background:#0f1d2f;border:1px solid #1e3a5f;border-radius:16px;padding:32px;max-width:480px;width:100%;position:relative;animation:modalIn .3s ease}
@keyframes modalIn{from{opacity:0;transform:scale(.95) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}
.modal-close{position:absolute;top:16px;right:16px;background:none;border:none;color:#64748b;font-size:18px;cursor:pointer;padding:4px;transition:color .2s}
.modal-close:hover{color:#e2e8f0}
.modal-box h2{font-size:20px;font-weight:700;color:#f59e0b;margin-bottom:20px}
.modal-box ol{list-style:none;counter-reset:rules;padding:0}
.modal-box ol li{counter-increment:rules;padding:10px 0 10px 40px;position:relative;border-bottom:1px solid rgba(30,58,95,.4);color:#cbd5e1;font-size:14px;line-height:1.6}
.modal-box ol li:last-child{border-bottom:none}
.modal-box ol li::before{content:counter(rules);position:absolute;left:0;top:10px;width:26px;height:26px;background:rgba(245,158,11,.15);color:#f59e0b;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;font-family:'Space Grotesk',sans-serif}

/* === MAP VIEW === */
.map-view{padding-top:60px;min-height:100vh;position:relative;overflow:hidden}
.map-bg{position:absolute;inset:0;background:radial-gradient(ellipse at 30% 20%,rgba(245,158,11,.04) 0%,transparent 50%),radial-gradient(ellipse at 70% 80%,rgba(16,185,129,.03) 0%,transparent 50%)}
.map-container{position:relative;max-width:700px;margin:0 auto;padding:40px 20px 80px}
.map-svg{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}
.map-path-line{stroke:#1e3a5f;stroke-width:3;fill:none;stroke-dasharray:8 6;opacity:.7}
.map-node{position:absolute;z-index:2;cursor:pointer;transition:transform .25s ease,filter .25s ease}
.map-node:hover{transform:scale(1.12);filter:brightness(1.2)}
.map-node-circle{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:16px;border:3px solid #1e3a5f;background:#0a1628;color:#64748b;transition:all .3s ease;position:relative}
.map-node.active .map-node-circle{border-color:#f59e0b;color:#f59e0b;box-shadow:0 0 24px rgba(245,158,11,.35),inset 0 0 12px rgba(245,158,11,.1)}
.map-node.completed .map-node-circle{border-color:#10b981;color:#10b981;background:rgba(16,185,129,.1);box-shadow:0 0 16px rgba(16,185,129,.2)}
.map-node.completed .map-node-circle::after{content:'\f00c';font-family:'Font Awesome 6 Free';font-weight:900;font-size:14px;position:absolute}
.map-node.completed .map-node-circle .node-label{opacity:0}
.map-node-label{position:absolute;left:50%;transform:translateX(-50%);white-space:nowrap;font-size:12px;font-weight:600;color:#94a3b8;transition:color .3s;text-align:center;pointer-events:none;max-width:160px}
.map-node-label.top{bottom:calc(100% + 8px)}
.map-node-label.bottom{top:calc(100% + 8px)}
.map-node.active .map-node-label{color:#fbbf24}
.map-node.completed .map-node-label{color:#34d399}
.map-node-time{font-size:10px;color:#475569;font-weight:400;display:block;margin-top:2px}
.map-title-banner{text-align:center;margin-bottom:40px;position:relative;z-index:1}
.map-title-banner h1{font-size:28px;font-weight:700;background:linear-gradient(135deg,#f59e0b,#fbbf24);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.map-title-banner p{color:#64748b;font-size:14px;margin-top:6px}

/* === CONTENT VIEW === */
.content-view{padding-top:60px;min-height:100vh;display:none;flex-direction:column}
.content-view.active{display:flex}
.content-inner{max-width:740px;width:100%;margin:0 auto;padding:24px 20px 80px;flex:1}
.back-btn{display:inline-flex;align-items:center;gap:8px;background:none;border:none;color:#94a3b8;font-size:14px;font-weight:500;cursor:pointer;padding:8px 0;margin-bottom:16px;font-family:'DM Sans',sans-serif;transition:color .2s}
.back-btn:hover{color:#f59e0b}
.node-title-bar{margin-bottom:20px}
.node-title-bar h2{font-size:22px;font-weight:700;color:#e2e8f0}
.node-title-bar .node-time{font-size:13px;color:#64748b;margin-top:4px}

/* === STEP INDICATOR === */
.step-indicator{display:flex;gap:4px;margin-bottom:8px;flex-wrap:wrap;align-items:center}
.step-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;font-family:'Space Grotesk',sans-serif;border:2px solid #1e3a5f;background:#0a1628;color:#475569;cursor:pointer;transition:all .25s ease;flex-shrink:0}
.step-dot.theory{border-radius:6px}
.step-dot.current{border-color:#f59e0b;color:#f59e0b;box-shadow:0 0 12px rgba(245,158,11,.25)}
.step-dot.done{border-color:#10b981;color:#10b981;background:rgba(16,185,129,.1)}
.step-dot.done.theory{background:rgba(16,185,129,.08)}
.step-info{font-size:12px;color:#64748b;margin-bottom:12px}

/* === PROGRESS BAR === */
.progress-wrap{width:100%;height:6px;background:#0a1628;border-radius:3px;overflow:hidden;margin-bottom:24px;border:1px solid #1e3a5f}
.progress-fill{height:100%;background:linear-gradient(90deg,#10b981,#34d399);border-radius:3px;transition:width .4s ease;width:0}

/* === THEORY CARD === */
.theory-card{background:linear-gradient(135deg,rgba(15,29,47,.9),rgba(21,42,66,.6));border:1px solid #1e3a5f;border-radius:14px;padding:28px;margin-bottom:16px;position:relative;overflow:hidden}
.theory-card::before{content:'';position:absolute;top:0;left:0;width:4px;height:100%;background:linear-gradient(180deg,#f59e0b,#d97706);border-radius:4px 0 0 4px}
.theory-card h3{font-size:18px;font-weight:700;color:#fbbf24;margin-bottom:14px}
.theory-card p,.theory-card li{color:#cbd5e1;font-size:15px;line-height:1.75}
.theory-card ul,.theory-card ol{padding-left:20px;margin:8px 0}
.theory-card li{margin-bottom:4px}
.theory-en{font-size:13px;color:#64748b;font-style:italic;margin-top:12px;padding-top:12px;border-top:1px solid rgba(30,58,95,.4);line-height:1.6}
.theory-card .katex-display{margin:12px 0;overflow-x:auto}

/* === EXERCISE WRAPPER === */
.exercise-wrapper{background:#0f1d2f;border:1px solid #1e3a5f;border-radius:14px;padding:28px;margin-bottom:16px;transition:border-color .3s}
.exercise-wrapper.correct{border-color:#10b981;background:rgba(16,185,129,.04)}
.exercise-wrapper.wrong{border-color:#ef4444;background:rgba(239,68,68,.04)}
.question-block{margin-bottom:20px}
.question-text{font-size:15px;font-weight:600;color:#e2e8f0;line-height:1.7}
.question-text-en{font-size:12px;color:#64748b;font-style:italic;margin-top:4px}
.exercise-body{margin-bottom:20px}

/* === FILL IN === */
.fill-input{width:100%;max-width:300px;padding:10px 16px;background:#0a1628;border:2px solid #1e3a5f;border-radius:10px;color:#e2e8f0;font-size:16px;font-family:'DM Sans',sans-serif;transition:border-color .2s;outline:none}
.fill-input:focus{border-color:#f59e0b}
.fill-input:disabled{opacity:.7;cursor:default}
.fill-input.input-correct{border-color:#10b981}
.fill-input.input-wrong{border-color:#ef4444}
.fill-input::placeholder{color:#475569}

/* === CHECKBOX / RADIO === */
.option-list{display:flex;flex-direction:column;gap:10px}
.option-item{display:flex;align-items:center;gap:12px;padding:12px 16px;background:#0a1628;border:2px solid #1e3a5f;border-radius:10px;cursor:pointer;transition:all .2s;user-select:none}
.option-item:hover{border-color:#2a4f7a;background:rgba(30,58,95,.3)}
.option-item.selected{border-color:#f59e0b;background:rgba(245,158,11,.06)}
.option-item.option-correct{border-color:#10b981!important;background:rgba(16,185,129,.08)!important}
.option-item.option-wrong{border-color:#ef4444!important;background:rgba(239,68,68,.06)!important}
.option-item input{display:none}
.option-marker{width:22px;height:22px;border:2px solid #2a4f7a;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;font-size:11px;color:transparent}
.option-item[data-type="checkbox"] .option-marker{border-radius:6px}
.option-item.selected .option-marker{border-color:#f59e0b;background:#f59e0b;color:#0a1628}
.option-item.option-correct .option-marker{border-color:#10b981!important;background:#10b981!important;color:#fff!important}
.option-item.option-wrong .option-marker{border-color:#ef4444!important;background:#ef4444!important;color:#fff!important}
.option-text{font-size:14px;color:#cbd5e1;line-height:1.5;flex:1}
.option-text .katex{font-size:1em}

/* === TRUE/FALSE === */
.tf-buttons{display:flex;gap:12px}
.tf-btn{flex:1;padding:14px;border:2px solid #1e3a5f;border-radius:10px;background:#0a1628;color:#cbd5e1;font-size:15px;font-weight:600;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif;display:flex;align-items:center;justify-content:center;gap:8px}
.tf-btn:hover{border-color:#2a4f7a}
.tf-btn.selected{border-color:#f59e0b;background:rgba(245,158,11,.08);color:#fbbf24}
.tf-btn.tf-correct{border-color:#10b981!important;background:rgba(16,185,129,.1)!important;color:#34d399!important}
.tf-btn.tf-wrong{border-color:#ef4444!important;background:rgba(239,68,68,.08)!important;color:#f87171!important}

/* === PAIRING === */
.pairing-cols{display:grid;grid-template-columns:1fr 1fr;gap:20px}
@media(max-width:500px){.pairing-cols{grid-template-columns:1fr;gap:12px}}
.pairing-col{display:flex;flex-direction:column;gap:8px}
.pairing-col-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#64748b;margin-bottom:4px}
.pair-item{padding:12px 16px;background:#0a1628;border:2px solid #1e3a5f;border-radius:10px;cursor:pointer;transition:all .2s;font-size:14px;color:#cbd5e1;user-select:none;text-align:center}
.pair-item:hover{border-color:#2a4f7a}
.pair-item.pair-selected{border-color:#f59e0b;background:rgba(245,158,11,.08);box-shadow:0 0 12px rgba(245,158,11,.15)}
.pair-item.pair-matched{border-color:#10b981;background:rgba(16,185,129,.08)}
.pair-item.pair-wrong-match{border-color:#ef4444;background:rgba(239,68,68,.06)}
.pair-color-0{border-left:4px solid #f59e0b}
.pair-color-1{border-left:4px solid #3b82f6}
.pair-color-2{border-left:4px solid #a855f7}
.pair-color-3{border-left:4px solid #ec4899}
.pair-color-4{border-left:4px solid #14b8a6}
.pair-color-r0{border-right:4px solid #f59e0b}
.pair-color-r1{border-right:4px solid #3b82f6}
.pair-color-r2{border-right:4px solid #a855f7}
.pair-color-r3{border-right:4px solid #ec4899}
.pair-color-r4{border-right:4px solid #14b8a6}

/* === ORDER === */
.order-list{display:flex;flex-direction:column;gap:8px}
.order-item{display:flex;align-items:center;gap:12px;padding:12px 16px;background:#0a1628;border:2px solid #1e3a5f;border-radius:10px;transition:all .25s}
.order-item.order-correct{border-color:#10b981;background:rgba(16,185,129,.06)}
.order-item.order-wrong{border-color:#ef4444;background:rgba(239,68,68,.04)}
.order-num{width:28px;height:28px;border-radius:50%;background:#1e3a5f;color:#94a3b8;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;font-family:'Space Grotesk',sans-serif}
.order-text{flex:1;font-size:14px;color:#cbd5e1}
.order-text .katex{font-size:1em}
.order-controls{display:flex;flex-direction:column;gap:2px}
.order-btn{width:28px;height:24px;border:1px solid #1e3a5f;background:#0a1628;color:#64748b;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:10px;transition:all .2s}
.order-btn:hover{background:#1e3a5f;color:#e2e8f0}
.order-btn:disabled{opacity:.3;cursor:default}

/* === DRAG & DROP === */
.dnd-question{margin-bottom:16px;font-size:15px;line-height:1.8;color:#cbd5e1}
.dnd-question .katex{font-size:1em}
.dnd-zone{display:inline-block;min-width:60px;min-height:36px;padding:4px 14px;border:2px dashed #2a4f7a;border-radius:8px;background:rgba(10,22,40,.6);vertical-align:middle;text-align:center;font-weight:700;color:#f59e0b;font-size:16px;transition:all .2s;margin:0 4px}
.dnd-zone.dnd-zone-hover{border-color:#f59e0b;background:rgba(245,158,11,.08);box-shadow:0 0 12px rgba(245,158,11,.2)}
.dnd-zone.dnd-zone-filled{border-style:solid;border-color:#10b981;color:#34d399;background:rgba(16,185,129,.06)}
.dnd-zone.dnd-zone-wrong{border-color:#ef4444!important;color:#f87171!important;background:rgba(239,68,68,.06)!important}
.dnd-bank{display:flex;flex-wrap:wrap;gap:10px;padding:16px;background:#0a1628;border:2px solid #1e3a5f;border-radius:10px;margin-top:12px;min-height:52px}
.dnd-bank-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#64748b;margin-bottom:8px;width:100%}
.dnd-draggable{padding:8px 18px;background:linear-gradient(135deg,#1e3a5f,#2a4f7a);border:2px solid #2a4f7a;border-radius:8px;color:#e2e8f0;font-size:15px;font-weight:600;cursor:grab;user-select:none;transition:all .2s;font-family:'Space Grotesk',sans-serif}
.dnd-draggable:hover{border-color:#f59e0b;background:linear-gradient(135deg,#2a4f7a,#3b6098);transform:translateY(-1px)}
.dnd-draggable.dnd-dragging{opacity:.4;transform:scale(.95)}
.dnd-draggable.dnd-placed{opacity:.3;cursor:default;pointer-events:none}
.dnd-ghost{position:fixed;z-index:9999;pointer-events:none;padding:8px 18px;background:linear-gradient(135deg,#f59e0b,#d97706);border:2px solid #f59e0b;border-radius:8px;color:#0a1628;font-size:15px;font-weight:700;font-family:'Space Grotesk',sans-serif;box-shadow:0 8px 32px rgba(245,158,11,.4);transform:rotate(2deg) scale(1.05)}

/* === EXERCISE ACTIONS === */
.exercise-actions{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.btn-check,.btn-reset{padding:10px 24px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;border:2px solid transparent;font-family:'DM Sans',sans-serif}
.btn-check{background:linear-gradient(135deg,#f59e0b,#d97706);color:#0a1628;border-color:#f59e0b}
.btn-check:hover{box-shadow:0 4px 20px rgba(245,158,11,.35);transform:translateY(-1px)}
.btn-check:disabled{opacity:.5;cursor:default;transform:none;box-shadow:none}
.btn-check.btn-correct-show{background:linear-gradient(135deg,#10b981,#059669);border-color:#10b981;color:#fff}
.btn-reset{background:transparent;color:#94a3b8;border-color:#1e3a5f}
.btn-reset:hover{border-color:#475569;color:#e2e8f0}

/* === EXPLANATION === */
.explanation-block{border:1px solid #1e3a5f;border-radius:10px;overflow:hidden;margin-bottom:8px}
.explanation-toggle{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:rgba(30,58,95,.3);cursor:pointer;user-select:none;transition:background .2s}
.explanation-toggle:hover{background:rgba(30,58,95,.5)}
.explanation-toggle span{font-size:13px;font-weight:600;color:#94a3b8}
.explanation-toggle i{font-size:12px;color:#64748b;transition:transform .3s}
.explanation-toggle.open i{transform:rotate(180deg)}
.explanation-content{max-height:0;overflow:hidden;transition:max-height .35s ease;padding:0 16px}
.explanation-content.open{max-height:600px;padding:16px}
.explanation-content p{font-size:14px;color:#cbd5e1;line-height:1.7;margin-bottom:6px}
.explanation-content .exp-en{font-size:12px;color:#64748b;font-style:italic}

/* === NAV BUTTONS === */
.nav-buttons{display:flex;justify-content:space-between;gap:12px;margin-top:20px;padding-top:20px;border-top:1px solid #1e3a5f}
.nav-btn{padding:10px 24px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;border:2px solid #1e3a5f;background:transparent;color:#94a3b8;font-family:'DM Sans',sans-serif;display:flex;align-items:center;gap:8px}
.nav-btn:hover{border-color:#2a4f7a;color:#e2e8f0;background:rgba(30,58,95,.3)}
.nav-btn:disabled{opacity:.3;cursor:default}
.nav-btn.primary{background:linear-gradient(135deg,#f59e0b,#d97706);border-color:#f59e0b;color:#0a1628}
.nav-btn.primary:hover{box-shadow:0 4px 16px rgba(245,158,11,.3)}

/* === RESULT CARD (ASSIGNMENT) === */
.result-card{background:linear-gradient(135deg,rgba(15,29,47,.95),rgba(21,42,66,.7));border:1px solid #1e3a5f;border-radius:16px;padding:32px;text-align:center}
.result-score{font-size:56px;font-weight:700;font-family:'Space Grotesk',sans-serif;margin:16px 0}
.result-score.perfect{color:#10b981}
.result-score.good{color:#fbbf24}
.result-score.low{color:#ef4444}
.result-table{width:100%;border-collapse:collapse;margin:20px 0;font-size:13px;text-align:left}
.result-table th{background:#0a1628;color:#94a3b8;font-weight:600;padding:10px 12px;border:1px solid #1e3a5f;font-size:11px;text-transform:uppercase;letter-spacing:.5px}
.result-table td{padding:10px 12px;border:1px solid #1e3a5f;color:#cbd5e1;vertical-align:top}
.result-table .correct-mark{color:#10b981;font-size:16px}
.result-table .wrong-mark{color:#ef4444;font-size:16px}
.btn-print{padding:12px 32px;background:linear-gradient(135deg,#f59e0b,#d97706);color:#0a1628;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif;display:inline-flex;align-items:center;gap:8px;margin-top:16px}
.btn-print:hover{box-shadow:0 4px 20px rgba(245,158,11,.4);transform:translateY(-2px)}

/* === NAME INPUT (ASSIGNMENT) === */
.name-input-wrap{display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap}

/* ==========================================================
   UTILITAS
   ========================================================== */
function $(sel){ return document.querySelector(sel); }
function $$(sel){ return document.querySelectorAll(sel); }

// Shuffle array (Fisher-Yates)
function shuffle(arr){
  const a = [...arr];
  for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]; }
  return a;
}

// Render KaTeX di dalam elemen
function renderKaTeX(el){
  if(!el || !window.renderMathInElement) return;
  renderMathInElement(el, {
    delimiters:[
      {left:'$$',right:'$$',display:true},
      {left:'$',right:'$',display:false},
      {left:'\\(',right:'\\)',display:false},
      {left:'\\[',right:'\\]',display:true}
    ],
    throwOnError:false
  });
}

// Escape HTML
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// Tanggal hari ini

  return d.toLocaleDateString('id-ID',{day:'2-digit',month:'long',year:'numeric'});
}

/* ==========================================================
   NODE MAP - Rendering peta dengan node
   ========================================================== */
const MAP_ROW_H = 110;
const MAP_COL_LEFT = 0.22;
const MAP_COL_RIGHT = 0.78;
const MAP_TOP_PAD = 120;

function getNodePos(index){
  const meta = NODE_META[index];
  return {
    x: meta.col === 0 ? MAP_COL_LEFT : MAP_COL_RIGHT,
    y: MAP_TOP_PAD + index * MAP_ROW_H
  };
}

function renderMap(){
  const container = $('#mapContainer');
  const nodesDiv = $('#mapNodes');
  const svg = $('#mapSvg');

  // Hitung tinggi container
  const totalH = MAP_TOP_PAD + (NODE_META.length - 1) * MAP_ROW_H + 80;
  container.style.minHeight = totalH + 'px';

  // Gambar garis penghubung di SVG
  let pathD = '';
  for(let i = 0; i < NODE_META.length - 1; i++){
    const p1 = getNodePos(i);
    const p2 = getNodePos(i + 1);
    // Konversi ke persen -> kita pakai viewBox yang sesuai
    const x1 = p1.x * 100, y1 = p1.y;
    const x2 = p2.x * 100, y2 = p2.y;
    const cy1 = y1 + (y2 - y1) * 0.5;
    pathD += `M ${x1} ${y1} C ${x1} ${cy1}, ${x2} ${cy1}, ${x2} ${y2} `;
  }
  svg.setAttribute('viewBox', `0 0 100 ${totalH}`);
  svg.style.height = totalH + 'px';
  svg.innerHTML = `<path d="${pathD}" class="map-path-line"/>`;

  // Render node elements
  let nodesHTML = '';
  NODE_META.forEach((meta, i) => {
    const pos = getNodePos(i);
    const isCompleted = state.completed[meta.id] && state.completed[meta.id].size > 0;
    const isActive = state.currentNode === meta.id;
    const cls = ['map-node', isCompleted ? 'completed' : '', isActive ? 'active' : ''].filter(Boolean).join(' ');
    const labelPos = meta.col === 0 ? 'bottom' : 'bottom';
    const data = NODES[meta.id];
    const totalEx = data ? data.steps.filter(s => s.type !== 'theory' && s.type !== 'result').length : 0;
    const doneEx = state.completed[meta.id] ? state.completed[meta.id].size : 0;
    const progText = totalEx > 0 ? `${doneEx}/${totalEx}` : '';

    nodesHTML += `
      <div class="${cls}" style="left:${pos.x*100}%;top:${pos.y}px;transform:translate(-50%,-50%)" 
           onclick="openNode('${meta.id}')" data-node-id="${meta.id}">
        <div class="map-node-circle"><span class="node-label">${meta.label}</span></div>
        <div class="map-node-label ${labelPos}">
          ${esc(meta.title)}
          ${meta.time ? `<span class="map-node-time">${meta.time}</span>` : ''}
          ${progText ? `<span class="map-node-time">${progText} selesai</span>` : ''}
        </div>
      </div>`;
  });
  nodesDiv.innerHTML = nodesHTML;
}

function updateMapNode(nodeId){
  const el = document.querySelector(`.map-node[data-node-id="${nodeId}"]`);
  if(!el) return;
  const isCompleted = state.completed[nodeId] && state.completed[nodeId].size > 0;
  el.classList.toggle('completed', isCompleted);
  // Update progress text
  const data = NODES[nodeId];
  if(data){
    const totalEx = data.steps.filter(s => s.type !== 'theory' && s.type !== 'result').length;
    const doneEx = state.completed[nodeId].size;
    const meta = NODE_META.find(n => n.id === nodeId);
    const label = el.querySelector('.map-node-label');
    if(label && meta){
      let html = esc(meta.title);
      if(meta.time) html += `<span class="map-node-time">${meta.time}</span>`;
      if(totalEx > 0) html += `<span class="map-node-time">${doneEx}/${totalEx} selesai</span>`;
      label.innerHTML = html;
    }
  }
}

/* ==========================================================
   NAVIGASI - Buka/tutup node
   ========================================================== */
function openNode(nodeId){
  if(!NODES[nodeId]){
    // Tampilkan pesan jika data belum ada
    alert('Materi untuk node ini belum tersedia. Pastikan semua bagian kode sudah digabungkan.');
    return;
  }
  state.currentNode = nodeId;
  state.currentStep = 0;

  // Inisialisasi state khusus jika belum ada
  if(!state.completed[nodeId]) state.completed[nodeId] = new Set();

  $('#mapView').style.display = 'none';
  $('#contentView').classList.add('active');
  renderContent();
  window.scrollTo({top:0, behavior:'smooth'});
}

function closeNode(){
  $('#contentView').classList.remove('active');
  $('#mapView').style.display = '';
  state.currentNode = null;
  renderMap();
}

/* ==========================================================
   CONTENT - Render seluruh konten node
   ========================================================== */
function renderContent(){
  const nodeId = state.currentNode;
  const data = NODES[nodeId];
  const meta = NODE_META.find(n => n.id === nodeId);
  if(!data || !meta) return;

  const steps = data.steps;
  const stepIdx = state.currentStep;
  const step = steps[stepIdx];
  const isAssignment = nodeId.startsWith('node7');
  const exerciseSteps = steps.filter(s => s.type !== 'theory' && s.type !== 'result');
  const doneCount = state.completed[nodeId].size;
  const totalCount = exerciseSteps.length;
  const pct = totalCount > 0 ? Math.round((doneCount / totalCount) * 100) : 0;

  // Step indicator dots
  let dotsHTML = '';
  steps.forEach((s, i) => {
    const isTheory = s.type === 'theory' || s.type === 'result';
    const isDone = !isTheory && state.completed[nodeId].has(s.id);
    const isCurrent = i === stepIdx;
    const cls = ['step-dot', isTheory ? 'theory' : '', isDone ? 'done' : '', isCurrent ? 'current' : ''].filter(Boolean).join(' ');
    dotsHTML += `<div class="${cls}" onclick="goToStep(${i})" title="${isTheory ? 'Teori' : 'Latihan'} ${i+1}">${i+1}</div>`;
  });

  let html = `
    <button class="back-btn" onclick="closeNode()"><i class="fas fa-arrow-left"></i> Kembali ke Peta</button>
    <div class="node-title-bar">
      <h2>${esc(meta.title)}</h2>
      <div class="node-time">${esc(meta.titleEn)}${meta.time ? ' &middot; ' + meta.time : ''}</div>
    </div>
    <div class="step-indicator">${dotsHTML}</div>
    <div class="step-info">Langkah ${stepIdx+1} dari ${steps.length}${totalCount > 0 ? ' &middot; ' + doneCount + '/' + totalCount + ' latihan selesai' : ''}</div>
    <div class="progress-wrap"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div class="fade-in-up" id="stepArea"></div>
    <div class="nav-buttons">
      <button class="nav-btn" onclick="prevStep()" ${stepIdx === 0 ? 'disabled' : ''}><i class="fas fa-chevron-left"></i> Sebelumnya</button>
      <button class="nav-btn primary" onclick="nextStep()" ${stepIdx === steps.length - 1 ? 'disabled' : ''}>Selanjutnya <i class="fas fa-chevron-right"></i></button>
    </div>
  `;

  $('#contentInner').innerHTML = html;

  // Render step content
  const area = $('#stepArea');
  if(step.type === 'theory'){
    renderTheory(area, step);
  } else if(step.type === 'result'){
    renderResult(area, nodeId, steps);
  } else {
    renderExercise(area, step, isAssignment);
  }

  renderKaTeX(area);
}

function goToStep(idx){
  const data = NODES[state.currentNode];
  if(idx >= 0 && idx < data.steps.length){
    state.currentStep = idx;
    renderContent();
  }
}
function prevStep(){ goToStep(state.currentStep - 1); }
function nextStep(){ goToStep(state.currentStep + 1); }

/* ==========================================================
   THEORY RENDERER
   ========================================================== */
function renderTheory(container, item){
  container.innerHTML = `
    <div class="theory-card">
      ${item.title ? `<h3>${item.title}</h3>` : ''}
      <div class="theory-body">${item.content}</div>
      ${item.contentEn ? `<div class="theory-en">${item.contentEn}</div>` : ''}
    </div>
  `;
  renderKaTeX(container);
}

/* ==========================================================
   EXERCISE RENDERER - Dispatcher
   ========================================================== */
function renderExercise(container, item, isAssignment){
  const isDone = state.completed[item.id];
  let bodyHTML = '';
  switch(item.type){
    case 'fill': bodyHTML = renderFillBody(item, isDone); break;
    case 'checkbox': bodyHTML = renderCheckboxBody(item, isDone); break;
    case 'radio': bodyHTML = renderRadioBody(item, isDone); break;
    case 'pairing': bodyHTML = renderPairingBody(item, isDone); break;
    case 'truefalse': bodyHTML = renderTrueFalseBody(item, isDone); break;
    case 'order': bodyHTML = renderOrderBody(item, isDone); break;
    case 'dragdrop': bodyHTML = renderDragDropBody(item, isDone); break;
    default: bodyHTML = `<p style="color:#ef4444">Tipe exercise tidak dikenali: ${item.type}</p>`;
  }

  const checkBtnClass = isDone ? 'btn-check btn-correct-show' : 'btn-check';
  const checkBtnText = isDone ? '<i class="fas fa-check" style="margin-right:6px"></i>Benar' : '<i class="fas fa-check" style="margin-right:6px"></i>Periksa';
  const checkDisabled = isDone ? 'disabled' : '';

  container.innerHTML = `
    <div class="exercise-wrapper" id="ew-${item.id}">
      <div class="question-block">
        <p class="question-text">${item.question}</p>
        <p class="question-text-en">${item.questionEn || ''}</p>
      </div>
      <div class="exercise-body" id="body-${item.id}">${bodyHTML}</div>
      <div class="exercise-actions">
        <button class="${checkBtnClass}" id="check-${item.id}" onclick="checkAnswer('${item.id}')" ${checkDisabled}>${checkBtnText}</button>
        <button class="btn-reset" onclick="resetAnswer('${item.id}')"><i class="fas fa-redo" style="margin-right:6px"></i>Reset</button>
      </div>
      <div class="explanation-block" id="exp-${item.id}" style="${isDone ? '' : 'display:none'}">
        <div class="explanation-toggle ${isDone ? 'open' : ''}" onclick="toggleExp('${item.id}')">
          <span><i class="fas fa-lightbulb" style="margin-right:6px;color:#f59e0b"></i>Penjelasan</span>
          <i class="fas fa-chevron-down"></i>
        </div>
        <div class="explanation-content ${isDone ? 'open' : ''}">
          <p>${item.explanation || ''}</p>
          ${item.explanationEn ? `<p class="exp-en">${item.explanationEn}</p>` : ''}
        </div>
      </div>
    </div>
  `;

  renderKaTeX(container);

  // Inisialisasi interaksi khusus
  if(item.type === 'pairing') initPairing(item);
  if(item.type === 'order') initOrder(item);
  if(item.type === 'dragdrop') initDragDrop(item);
}

/* ==========================================================
   FILL IN
   ========================================================== */
function renderFillBody(item, isDone){
  const val = isDone ? (Array.isArray(item.answer) ? item.answer[0] : item.answer) : '';
  const cls = isDone ? 'fill-input input-correct' : 'fill-input';
  return `<input type="text" class="${cls}" id="input-${item.id}" value="${esc(val)}" ${isDone ? 'disabled' : ''} placeholder="Ketik jawaban...">`;
}

function checkFill(item){
  const input = $(`#input-${item.id}`);
  if(!input) return false;
  const ua = input.value.trim();
  const ca = item.answer;
  let correct = false;
  if(Array.isArray(ca)) correct = ca.some(a => a.trim() === ua);
  else correct = ca.trim() === ua;
  input.classList.add(correct ? 'input-correct' : 'input-wrong');
  input.disabled = true;
  state.studentAnswers[item.id] = ua;
  return correct;
}

function renderCheckboxBody(item, isDone){

  item.options.forEach((opt, i) => {

/* ==========================================================
   RADIO
   ========================================================== */
function renderRadioBody(item, isDone){
  let html = '<div class="option-list">';
  item.options.forEach((opt, i) => {
    const selected = isDone && item.answer === opt.value;
    const correctOpt = item.answer === opt.value;
    const cls = isDone ? (correctOpt ? 'option-item selected option-correct' : 'option-item') : 'option-item';
    html += `
      <label class="${cls}" data-type="radio" data-value="${opt.value}" onclick="toggleOption(this,'radio')">
        <input type="radio" name="radio-${item.id}" ${selected ? 'checked disabled' : ''}>

// Handler untuk radio & checkbox
function toggleOption(el, type){
  if(el.classList.contains('option-correct')) return; // Sudah selesai, jangan ubah
  const wrapper = el.closest('.option-list');
  if(type === 'radio'){
    wrapper.querySelectorAll('.option-item').forEach(o => o.classList.remove('selected'));
    el.classList.add('selected');
    el.querySelector('input').checked = true;
  } else {
    el.classList.toggle('selected');
    el.querySelector('input').checked = el.classList.contains('selected');
  }
}

function getSelectedValues(itemId, type){
  const wrapper = $(`#body-${itemId}`);
  if(!wrapper) return [];
  if(type === 'radio'){
    const sel = wrapper.querySelector('.option-item.selected');
    return sel ? [sel.dataset.value] : [];
  }
  return [...wrapper.querySelectorAll('.option-item.selected')].map(o => o.dataset.value);
}

function checkChoice(item){
  const type = item.type;
  const selected = getSelectedValues(item.id, type);
  const correct = type === 'radio'
    ? selected.length === 1 && selected[0] === item.answer
    : selected.length === item.answer.length && selected.every(s => item.answer.includes(s));

  // Tandai visual
  const wrapper = $(`#body-${item.id}`);
  wrapper.querySelectorAll('.option-item').forEach(o => {
    const v = o.dataset.value;
    o.querySelector('input').disabled = true;
    if(item.answer.includes(v)){
      o.classList.add('option-correct');
    } else if(selected.includes(v)){
      o.classList.add('option-wrong');
    }
  });

  // Simpan jawaban teks
  const labels = item.options.filter(o => selected.includes(o.value)).map(o => {
    const tmp = document.createElement('div'); tmp.innerHTML = o.text; return tmp.textContent.trim();
  });
  state.studentAnswers[item.id] = labels.join('; ');
  return correct;
}

function renderTrueFalseBody(item, isDone){

  return `

              data-value="true" onclick="selectTF(this,'${item.id}')">

      </button>

function selectTF(btn, itemId){
  if(state.completed[state.currentNode]?.has(itemId)) return;
  const wrapper = btn.closest('.tf-buttons');
  wrapper.querySelectorAll('.tf-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
}

function checkTrueFalse(item){
  const wrapper = $(`#body-${item.id}`);
  const sel = wrapper.querySelector('.tf-btn.selected');
  if(!sel) return false;
  const userVal = sel.dataset.value === 'true';

/* ==========================================================
   PAIRING
   ========================================================== */
function renderPairingBody(item, isDone){
  const pairColors = ['pair-color-0','pair-color-1','pair-color-2','pair-color-3','pair-color-4'];
  if(isDone){
    // Tampilkan pasangan yang benar
    let leftHTML = '<div class="pairing-col"><div class="pairing-col-label">Kolom A</div>';
    let rightHTML = '<div class="pairing-col"><div class="pairing-col-label">Kolom B</div>';
    item.pairs.forEach((p, i) => {
      leftHTML += `<div class="pair-item pair-matched ${pairColors[i%5]}">${p.left}</div>`;
      rightHTML += `<div class="pair-item pair-matched ${pairColors[i%5].replace('pair-color-','pair-color-r')}">${p.right}</div>`;
    });
    leftHTML += '</div>';
    rightHTML += '</div>';
    return `<div class="pairing-cols">${leftHTML}${rightHTML}</div>`;
  }

  // Shuffle kanan
  const rightShuffled = shuffle(item.pairs.map((p, i) => ({ text: p.right, origIdx: i })));

  let leftHTML = '<div class="pairing-col"><div class="pairing-col-label">Kolom A</div>';
  let rightHTML = '<div class="pairing-col"><div class="pairing-col-label">Kolom B</div>';
  item.pairs.forEach((p, i) => {
    leftHTML += `<div class="pair-item" data-pair-idx="${i}" data-side="left" onclick="pairClick(this,'${item.id}')">${p.left}</div>`;
  });
  rightShuffled.forEach(r => {
    rightHTML += `<div class="pair-item" data-pair-idx="${r.origIdx}" data-side="right" onclick="pairClick(this,'${item.id}')">${r.text}</div>`;
  });
  leftHTML += '</div>';
  rightHTML += '</div>';
  return `<div class="pairing-cols">${leftHTML}${rightHTML}</div>`;
}

function initPairing(item){
  if(state.completed[state.currentNode]?.has(item.id)) return;
  state.pairingState[item.id] = { selectedLeft: null, pairs: {} };
}

function pairClick(el, itemId){
  if(state.completed[state.currentNode]?.has(itemId)) return;
  const ps = state.pairingState[itemId];
  if(!ps) return;
  const side = el.dataset.side;
  const idx = el.dataset.pairIdx;

  if(side === 'left'){
    // Deselect sebelumnya
    const body = $(`#body-${itemId}`);
    body.querySelectorAll('.pair-item[data-side="left"]').forEach(e => e.classList.remove('pair-selected'));
    el.classList.add('pair-selected');
    ps.selectedLeft = idx;
  } else if(side === 'right' && ps.selectedLeft !== null){
    // Jika right sudah dipasang, lepaskan dulu
    Object.keys(ps.pairs).forEach(k => {
      if(ps.pairs[k] === idx) delete ps.pairs[k];
    });

    // Buat pasangan
    ps.pairs[ps.selectedLeft] = idx;
    ps.selectedLeft = null;

    // Update visual
    updatePairingVisual(itemId);
  }
}

function updatePairingVisual(itemId){
  const ps = state.pairingState[itemId];
  const body = $(`#body-${itemId}`);
  const pairColors = ['pair-color-0','pair-color-1','pair-color-2','pair-color-3','pair-color-4'];
  let colorIdx = 0;
  const usedRight = new Set();

  // Reset semua
  body.querySelectorAll('.pair-item').forEach(el => {
    el.className = 'pair-item';
    el.setAttribute('data-side', el.dataset.side);
  });

  // Tandai pasangan
  Object.keys(ps.pairs).forEach(leftIdx => {
    const rightIdx = ps.pairs[leftIdx];
    const colorCls = pairColors[colorIdx % 5];
    const leftEl = body.querySelector(`.pair-item[data-side="left"][data-pair-idx="${leftIdx}"]`);
    const rightEl = body.querySelector(`.pair-item[data-side="right"][data-pair-idx="${rightIdx}"]`);
    if(leftEl){ leftEl.classList.add('pair-matched', colorCls); }
    if(rightEl){ rightEl.classList.add('pair-matched', colorCls.replace('pair-color-','pair-color-r')); }
    usedRight.add(rightIdx);
    colorIdx++;
  });

  // Deselect left
  body.querySelectorAll('.pair-item[data-side="left"]').forEach(e => e.classList.remove('pair-selected'));
  ps.selectedLeft = null;
}

function checkPairing(item){
  const ps = state.pairingState[item.id];
  if(!ps) return false;
  const body = $(`#body-${item.id}`);
  const pairColors = ['pair-color-0','pair-color-1','pair-color-2','pair-color-3','pair-color-4'];
  let allCorrect = true;
  let colorIdx = 0;

  // Cek setiap pasangan
  Object.keys(ps.pairs).forEach(leftIdx => {
    const rightIdx = ps.pairs[leftIdx];
    const correct = item.pairs[leftIdx] && parseInt(leftIdx) === item.pairs[leftIdx]._origIdx && rightIdx == item.pairs[leftIdx]._rightOrigIdx;
    // Mapping sederhana: leftIdx (string) -> harus cocok dengan index di pairs array
    // rightIdx harus = leftIdx (karena pasangan ke-i kiri dengan ke-i kanan)
  });

  // Logika sederhana: pasangan benar jika leftIdx === rightIdx (karena pairs[i].left harus cocok dengan pairs[i].right)
  let correctCount = 0;
  const totalPairs = item.pairs.length;
  Object.keys(ps.pairs).forEach(leftIdx => {
    if(ps.pairs[leftIdx] === leftIdx) correctCount++;
  });
  const correct = correctCount === totalPairs && Object.keys(ps.pairs).length === totalPairs;

  // Tandai visual benar/salah
  body.querySelectorAll('.pair-item').forEach(el => { el.style.pointerEvents = 'none'; });
  Object.keys(ps.pairs).forEach(leftIdx => {
    const rightIdx = ps.pairs[leftIdx];
    const isMatch = leftIdx === rightIdx;
    const leftEl = body.querySelector(`.pair-item[data-side="left"][data-pair-idx="${leftIdx}"]`);
    const rightEl = body.querySelector(`.pair-item[data-side="right"][data-pair-idx="${rightIdx}"]`);
    if(!isMatch){
      if(leftEl) leftEl.classList.add('pair-wrong-match');
      if(rightEl) rightEl.classList.add('pair-wrong-match');
    }
  });

  // Simpan jawaban teks
  const answerTexts = Object.keys(ps.pairs).map(li => {
    const ri = ps.pairs[li];
    const lText = item.pairs[li] ? item.pairs[li].left : '?';
    const rText = item.pairs[ri] ? item.pairs[ri].right : '?';
    return lText + ' ↔ ' + rText;
  });
  state.studentAnswers[item.id] = answerTexts.join('; ');
  return correct;
}

/* ==========================================================
   ORDER

function renderOrderBody(item, isDone){
  let items;
  if(isDone){
    items = item.answer.map(idx => ({ text: item.items[idx], correctIdx: idx }));
  } else {
    items = shuffle(item.items.map((text, idx) => ({ text, correctIdx: idx })));
  }
  let html = '<div class="order-list" id="order-list-' + item.id + '">';
  items.forEach((it, i) => {
    const cls = isDone ? 'order-item order-correct' : 'order-item';
    html += `
      <div class="${cls}" data-orig-idx="${it.correctIdx}">
        <span class="order-num">${i+1}</span>
        <span class="order-text">${it.text}</span>
        ${!isDone ? `<div class="order-controls">
          <button class="order-btn" onclick="moveOrder('${item.id}',this,-1)" ${i===0?'disabled':''}><i class="fas fa-chevron-up"></i></button>
          <button class="order-btn" onclick="moveOrder('${item.id}',this,1)" ${i===items.length-1?'disabled':''}><i class="fas fa-chevron-down"></i></button>
        </div>` : ''}
      </div>`;
  });
  html += '</div>';
  return html;
}

function initOrder(item){ /* Tidak perlu inisialisasi khusus */ }

function moveOrder(itemId, btn, dir){
  if(state.completed[state.currentNode]?.has(itemId)) return;
  const list = $(`#order-list-${itemId}`);
  const item_el = btn.closest('.order-item');
  if(dir === -1 && item_el.previousElementSibling){
    list.insertBefore(item_el, item_el.previousElementSibling);
  } else if(dir === 1 && item_el.nextElementSibling){
    list.insertBefore(item_el.nextElementSibling, item_el);
  }
  // Update nomor
  [...list.children].forEach((el, i) => {
    el.querySelector('.order-num').textContent = i + 1;
    const btns = el.querySelectorAll('.order-btn');
    if(btns[0]) btns[0].disabled = i === 0;
    if(btns[1]) btns[1].disabled = i === list.children.length - 1;
  });
}

function checkOrder(item){
  const listEl = $(`#order-list-${item.id}`);
  if(!listEl) return false;
  const currentOrder = [...listEl.children].map(el => parseInt(el.dataset.origIdx));
  const correct = JSON.stringify(currentOrder) === JSON.stringify(item.answer);

  // Disable tombol & tandai
  listEl.querySelectorAll('.order-btn').forEach(b => b.disabled = true);
  listEl.querySelectorAll('.order-item').forEach(el => {
    el.classList.add(correct ? 'order-correct' : 'order-wrong');
    el.style.cursor = 'default';
  });

  // Simpan jawaban
  const texts = currentOrder.map(idx => {
    const tmp = document.createElement('div'); tmp.innerHTML = item.items[idx]; return tmp.textContent.trim();
  });
  state.studentAnswers[item.id] = texts.join(' → ');
  return correct;
}

/* ==========================================================
   DRAG & DROP
   ========================================================== */
function renderDragDropBody(item, isDone){
  var q = item.question.replace(/\x08/g, '');
  if(q.indexOf('\boxed{') === -1 && q.indexOf('oxed{') !== -1){
    q = q.split('oxed{').join('\boxed{');
  }
  var zoneIdx = 0;
  var parts = q.split('\boxed{');
  q = parts[0];
  for(var i = 1; i < parts.length; i++){
    var ci = parts[i].indexOf('}');
    var id = parts[i].substring(0, ci);
    var after = parts[i].substring(ci + 1);
    var zId = item.id + '_z' + zoneIdx;
    zoneIdx++;
    if(isDone){
      q += '<span class="dnd-zone dnd-zone-filled" data-zone-id="' + zId + '">' + (item.answer[zId] || '?') + '</span>' + after;
    } else {
      q += '<span class="dnd-zone" data-zone-id="' + zId + '" onclick="returnDnD(\'' + item.id + '\',\'' + zId + '\')"></span>' + after;
    }
  }
  var bankHTML = '<div class="dnd-bank" id="bank-' + item.id + '"><div class="dnd-bank-label">Seret jawaban ke kotak kosong</div>';
  item.draggables.forEach(function(d){
    var val = typeof d === 'object' ? d.value : d;
    var label = typeof d === 'object' ? d.label : d;
    var isPlaced = isDone;
    bankHTML += '<div class="dnd-draggable ' + (isPlaced ? 'dnd-placed' : '') + '" data-value="' + esc(val) + '" ' + (isPlaced ? '' : 'ondragstart="dndStart(event,\'' + item.id + '\')" ontouchstart="dndTouchStart(event,\'' + item.id + '\')"') + '>' + esc(label) + '</div>';
  });
  bankHTML += '</div>';
  return '<div class="dnd-question">' + q + '</div>' + bankHTML;
}

function initDragDrop(item){
  if(state.completed[state.currentNode]?.has(item.id)) return;
  state.dndState[item.id] = {};
  // Setup drop zones
  const body = $(`#body-${item.id}`);
  if(!body) return;
  body.querySelectorAll('.dnd-zone').forEach(z => {
    z.addEventListener('dragover', e => { e.preventDefault(); z.classList.add('dnd-zone-hover'); });
    z.addEventListener('dragleave', () => z.classList.remove('dnd-zone-hover'));
    z.addEventListener('drop', e => { e.preventDefault(); z.classList.remove('dnd-zone-hover'); dndDrop(item.id, z.dataset.zoneId, e.dataTransfer.getData('text/plain')); });
  });
}

// Global drag state
const dndGlobal = { active: false, itemId: null, ghost: null, value: null, offsetX: 0, offsetY: 0 };

function dndStart(e, itemId){
  if(state.completed[state.currentNode]?.has(itemId)) return;
  const val = e.target.dataset.value;
  dndGlobal.active = true;
  dndGlobal.itemId = itemId;
  dndGlobal.value = val;
  e.target.classList.add('dnd-dragging');
  e.dataTransfer.setData('text/plain', val);
  e.dataTransfer.effectAllowed = 'move';
}

function dndTouchStart(e, itemId){
  if(state.completed[state.currentNode]?.has(itemId)) return;
  e.preventDefault();
  const touch = e.touches[0];
  const el = e.target.closest('.dnd-draggable');
  if(!el) return;
  const rect = el.getBoundingClientRect();
  dndGlobal.active = true;
  dndGlobal.itemId = itemId;
  dndGlobal.value = el.dataset.value;
  dndGlobal.offsetX = touch.clientX - rect.left;
  dndGlobal.offsetY = touch.clientY - rect.top;
  el.classList.add('dnd-dragging');

  // Buat ghost
  const ghost = document.createElement('div');
  ghost.className = 'dnd-ghost';
  ghost.textContent = el.textContent;
  ghost.style.left = (touch.clientX - dndGlobal.offsetX) + 'px';
  ghost.style.top = (touch.clientY - dndGlobal.offsetY) + 'px';
  document.body.appendChild(ghost);
  dndGlobal.ghost = ghost;
}

document.addEventListener('touchmove', e => {
  if(!dndGlobal.active || !dndGlobal.ghost) return;
  e.preventDefault();
  const touch = e.touches[0];
  dndGlobal.ghost.style.left = (touch.clientX - dndGlobal.offsetX) + 'px';
  dndGlobal.ghost.style.top = (touch.clientY - dndGlobal.offsetY) + 'px';

  // Highlight zone di bawah jari
  const body = $(`#body-${dndGlobal.itemId}`);
  if(body){
    body.querySelectorAll('.dnd-zone').forEach(z => {
      const r = z.getBoundingClientRect();
      z.classList.toggle('dnd-zone-hover', touch.clientX >= r.left && touch.clientX <= r.right && touch.clientY >= r.top && touch.clientY <= r.bottom);
    });
  }
}, { passive: false });

document.addEventListener('touchend', e => {
  if(!dndGlobal.active) return;
  const touch = e.changedTouches[0];
  const body = $(`#body-${dndGlobal.itemId}`);

  if(body && dndGlobal.value){
    body.querySelectorAll('.dnd-zone').forEach(z => {
      const r = z.getBoundingClientRect();
      if(touch.clientX >= r.left && touch.clientX <= r.right && touch.clientY >= r.top && touch.clientY <= r.bottom){
        dndDrop(dndGlobal.itemId, z.dataset.zoneId, dndGlobal.value);
      }
      z.classList.remove('dnd-zone-hover');
    });
  }

  // Bersihkan
  if(dndGlobal.ghost) dndGlobal.ghost.remove();
  const body2 = $(`#body-${dndGlobal.itemId}`);
  if(body2) body2.querySelectorAll('.dnd-dragging').forEach(el => el.classList.remove('dnd-dragging'));
  dndGlobal.active = false;
  dndGlobal.ghost = null;
  dndGlobal.value = null;
});

document.addEventListener('dragend', () => {
  if(!dndGlobal.active) return;
  const body = $(`#body-${dndGlobal.itemId}`);
  if(body) body.querySelectorAll('.dnd-dragging').forEach(el => el.classList.remove('dnd-dragging'));
  body?.querySelectorAll('.dnd-zone').forEach(z => z.classList.remove('dnd-zone-hover'));
  dndGlobal.active = false;
});

function dndDrop(itemId, zoneId, value){
  const body = $(`#body-${itemId}`);
  if(!body) return;
  if(!state.dndState[itemId]) state.dndState[itemId] = {};

  // Jika zona sudah terisi, kembalikan isi lama ke bank
  const zone = body.querySelector(`.dnd-zone[data-zone-id="${zoneId}"]`);
  if(zone && zone.dataset.currentValue){
    const oldVal = zone.dataset.currentValue;
    const oldDrag = body.querySelector(`.dnd-draggable[data-value="${CSS.escape(oldVal)}"]`);
    if(oldDrag) oldDrag.classList.remove('dnd-placed');
  }

  // Jika value sudah diletakkan di zona lain, kembalikan
  Object.keys(state.dndState[itemId]).forEach(zId => {
    if(state.dndState[itemId][zId] === value){
      delete state.dndState[itemId][zId];
      const otherZone = body.querySelector(`.dnd-zone[data-zone-id="${zId}"]`);
      if(otherZone){ otherZone.textContent = ''; otherZone.classList.remove('dnd-zone-filled'); delete otherZone.dataset.currentValue; }
    }
  });

  // Letakkan di zona
  state.dndState[itemId][zoneId] = value;
  if(zone){
    zone.textContent = value;
    zone.dataset.currentValue = value;
    zone.classList.add('dnd-zone-filled');
  }

  // Tandai draggable sebagai placed
  const drag = body.querySelector(`.dnd-draggable[data-value="${CSS.escape(value)}"]`);
  if(drag) drag.classList.add('dnd-placed');
}

function returnDnD(itemId, zoneId){
  if(state.completed[state.currentNode]?.has(itemId)) return;
  const body = $(`#body-${itemId}`);
  if(!body) return;
  const zone = body.querySelector(`.dnd-zone[data-zone-id="${zoneId}"]`);
  if(!zone || !zone.dataset.currentValue) return;
  const val = zone.dataset.currentValue;
  const drag = body.querySelector(`.dnd-draggable[data-value="${CSS.escape(val)}"]`);
  if(drag) drag.classList.remove('dnd-placed');
  zone.textContent = '';
  zone.classList.remove('dnd-zone-filled');
  delete zone.dataset.currentValue;
  if(state.dndState[itemId]) delete state.dndState[itemId][zoneId];
}

function checkDragDrop(item){
  const ds = state.dndState[item.id] || {};
  let correct = true;
  const body = $(`#body-${item.id}`);

  // Cek setiap zona
  body.querySelectorAll('.dnd-zone').forEach(z => {
    const zId = z.dataset.zoneId;
    const userVal = ds[zId] || '';
    const correctVal = item.answer[zId] || '';
    if(userVal !== correctVal){
      correct = false;
      z.classList.add('dnd-zone-wrong');
    }
    z.style.cursor = 'default';
  });

  // Disable semua draggable
  body.querySelectorAll('.dnd-draggable').forEach(d => { d.style.pointerEvents = 'none'; d.draggable = false; });

  // Simpan jawaban
  const answers = Object.keys(item.answer).map(zId => ds[zId] || '-');
  state.studentAnswers[item.id] = answers.join(', ');
  return correct;
}

/* ==========================================================
   CHECK ANSWER - Dispatcher utama
   ========================================================== */
function checkAnswer(itemId){
  const nodeId = state.currentNode;
  if(state.completed[nodeId]?.has(itemId)) return; // Sudah benar

  // Cari item data
  const data = NODES[nodeId];
  const item = data.steps.find(s => s.id === itemId);
  if(!item) return;

  let correct = false;
  switch(item.type){
    case 'fill': correct = checkFill(item); break;
    case 'checkbox': correct = checkChoice(item); break;
    case 'radio': correct = checkChoice(item); break;
    case 'truefalse': correct = checkTrueFalse(item); break;
    case 'pairing': correct = checkPairing(item); break;
    case 'order': correct = checkOrder(item); break;
    case 'dragdrop': correct = checkDragDrop(item); break;
  }

  // Update UI
  const ew = $(`#ew-${itemId}`);
  if(ew) ew.classList.add(correct ? 'correct' : 'wrong');

  const checkBtn = $(`#check-${itemId}`);
  if(checkBtn){
    if(correct){
      checkBtn.className = 'btn-check btn-correct-show';
      checkBtn.innerHTML = '<i class="fas fa-check" style="margin-right:6px"></i>Benar';
      checkBtn.disabled = true;
      state.completed[nodeId].add(itemId);
      updateMapNode(nodeId);
    } else {
      checkBtn.disabled = false;
      // Biarkan user coba lagi setelah reset
    }
  }

  // Tampilkan penjelasan
  const expBlock = $(`#exp-${itemId}`);
  if(expBlock) expBlock.style.display = '';

  renderKaTeX(ew);
}

/* ==========================================================
   RESET ANSWER
   ========================================================== */
function resetAnswer(itemId){
  const nodeId = state.currentNode;
  const data = NODES[nodeId];
  const item = data.steps.find(s => s.id === itemId);
  if(!item) return;

  // Hapus dari completed
  state.completed[nodeId].delete(itemId);
  delete state.studentAnswers[item.id];

  // Reset UI
  const ew = $(`#ew-${itemId}`);
  if(ew) ew.classList.remove('correct', 'wrong');

  const expBlock = $(`#exp-${itemId}`);
  if(expBlock){
    expBlock.style.display = 'none';
    expBlock.querySelector('.explanation-toggle').classList.remove('open');
    expBlock.querySelector('.explanation-content').classList.remove('open');
  }

  const checkBtn = $(`#check-${itemId}`);
  if(checkBtn){
    checkBtn.className = 'btn-check';
    checkBtn.innerHTML = '<i class="fas fa-check" style="margin-right:6px"></i>Periksa';
    checkBtn.disabled = false;
  }

  // Re-render body
  const body = $(`#body-${itemId}`);
  if(body){
    let bodyHTML = '';
    switch(item.type){
      case 'fill': bodyHTML = renderFillBody(item, false); break;
      case 'checkbox': bodyHTML = renderCheckboxBody(item, false); break;
      case 'radio': bodyHTML = renderRadioBody(item, false); break;
      case 'truefalse': bodyHTML = renderTrueFalseBody(item, false); break;
      case 'pairing': bodyHTML = renderPairingBody(item, false); break;
      case 'order': bodyHTML = renderOrderBody(item, false); break;
      case 'dragdrop': bodyHTML = renderDragDropBody(item, false); break;
    }
    body.innerHTML = bodyHTML;
    renderKaTeX(body);

    // Re-init interaksi
    if(item.type === 'pairing') initPairing(item);
    if(item.type === 'dragdrop') initDragDrop(item);
  }

  updateMapNode(nodeId);
}

/* ==========================================================
   EXPLANATION TOGGLE
   ========================================================== */
function toggleExp(itemId){
  const block = $(`#exp-${itemId}`);
  if(!block) return;
  block.querySelector('.explanation-toggle').classList.toggle('open');
  block.querySelector('.explanation-content').classList.toggle('open');
}

/* ==========================================================
   RESULT RENDERER (untuk Assignment Node 7.x)
   ========================================================== */
function renderResult(container, nodeId, steps){
  const exerciseSteps = steps.filter(s => s.type !== 'theory' && s.type !== 'result');
  const meta = NODE_META.find(n => n.id === nodeId);
  const totalEx = exerciseSteps.length;
  let correctCount = 0;

  // Tabel hasil
  let rows = '';
  exerciseSteps.forEach((item, i) => {
    const isCorrect = state.completed[nodeId].has(item.id);
    if(isCorrect) correctCount++;
    const studentAns = state.studentAnswers[item.id] || '-';
    // Correct answer text
    let correctAnsText = '';
    switch(item.type){
      case 'fill': correctAnsText = Array.isArray(item.answer) ? item.answer[0] : item.answer; break;
      case 'radio': correctAnsText = item.options.find(o => o.value === item.answer)?.text || item.answer; break;
      case 'checkbox': correctAnsText = item.options.filter(o => item.answer.includes(o.value)).map(o => {const t=document.createElement('div');t.innerHTML=o.text;return t.textContent.trim()}).join('; '); break;
      case 'truefalse': correctAnsText = item.answer ? 'Benar' : 'Salah'; break;
      case 'pairing': correctAnsText = item.pairs.map(p => {const t1=document.createElement('div');t1.innerHTML=p.left;const t2=document.createElement('div');t2.innerHTML=p.right;return t1.textContent.trim()+' ↔ '+t2.textContent.trim()}).join('; '); break;
      case 'order': correctAnsText = item.answer.map(idx => {const t=document.createElement('div');t.innerHTML=item.items[idx];return t.textContent.trim()}).join(' → '); break;
      case 'dragdrop': correctAnsText = Object.values(item.answer).join(', '); break;
    }
    // Clean HTML tags dari correctAnsText
    const tmpDiv = document.createElement('div'); tmpDiv.innerHTML = correctAnsText; correctAnsText = tmpDiv.textContent.trim();

    rows += `<tr>
      <td>${i+1}</td>
      <td>${item.question.replace(/\$/g,'').replace(/\\\\/g,'').substring(0,80)}${item.question.length > 80 ? '...' : ''}</td>
      <td>${esc(studentAns)}</td>
      <td>${esc(correctAnsText)}</td>
      <td class="${isCorrect ? 'correct-mark' : 'wrong-mark'}"><i class="fas fa-${isCorrect ? 'check-circle' : 'times-circle'}"></i></td>
    </tr>`;
  });

  const scoreClass = correctCount === totalEx ? 'perfect' : correctCount >= totalEx * 0.7 ? 'good' : 'low';

  // Ambil nama dari input jika ada
  const nameInput = $(`.name-input-${nodeId}`);
  const studentName = nameInput ? nameInput.value.trim() : '...';

  const assessmentGroup = meta ? meta.title : nodeId;

  container.innerHTML = `
    <div class="name-input-wrap">
      <label for="name-${nodeId}">Nama:</label>
      <input type="text" class="name-input name-input-${nodeId}" id="name-${nodeId}" placeholder="Ketik nama lengkap..." value="${esc(studentName)}">
    </div>
    <div class="result-card">
      <h3 style="color:#94a3b8;font-size:14px;font-weight:600;text-transform:uppercase;letter-spacing:1px">Hasil Penilaian</h3>
      <div class="result-score ${scoreClass}">${correctCount}/${totalEx}</div>
      <div style="color:#64748b;font-size:13px;margin-bottom:20px">${correctCount === totalEx ? 'Sempurna! Luar biasa!' : correctCount >= totalEx * 0.7 ? 'Bagus! Terus berlatih!' : 'Jangan menyerah, coba lagi!'}</div>
      <div style="overflow-x:auto">
        <table class="result-table">
          <thead>
            <tr><th>No.</th><th>Soal</th><th>Jawaban Siswa</th><th>Jawaban Benar</th><th>Catatan</th></tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
      <button class="btn-print" onclick="printResult('${nodeId}')"><i class="fas fa-print"></i> Cetak Hasil</button>
    </div>
  `;
}

/* ==========================================================
   PRINT RESULT
   ========================================================== */
function printResult(nodeId){
  const meta = NODE_META.find(n => n.id === nodeId);
  const data = NODES[nodeId];
  const steps = data.steps;
  const exerciseSteps = steps.filter(s => s.type !== 'theory' && s.type !== 'result');
  const nameInput = $(`.name-input-${nodeId}`);
  const studentName = nameInput ? nameInput.value.trim() : '...';
  const totalEx = exerciseSteps.length;
  let correctCount = 0;

  // Strip HTML tags tapi pertahankan LaTeX
  function stripHTML(t){ const d=document.createElement('div'); d.innerHTML=t; return d.textContent||''; }
  // Potong teks, pertahankan LaTeX di akhir agar tidak terpotong di tengah formula
  function smartTruncate(raw, max){
    let s = stripHTML(raw);
    if(s.length <= max) return s;
    // Cari $ terakhir sebelum batas untuk menghindari potong formula
    let cut = max;
    let lastDollar = s.lastIndexOf('$', max);
    if(lastDollar > max * 0.5) cut = lastDollar + 1;
    else {
      let lastBackslash = s.lastIndexOf('\\', max);
      if(lastBackslash > max * 0.5) cut = lastBackslash;
    }
    return s.substring(0, cut).trim() + '...';
  }

  let rows = '';
  exerciseSteps.forEach((item, i) => {
    const isCorrect = state.completed[nodeId].has(item.id);
    if(isCorrect) correctCount++;
    const studentAns = state.studentAnswers[item.id] || '-';

    let correctAnsText = '';
    switch(item.type){
      case 'fill': correctAnsText = Array.isArray(item.answer) ? item.answer[0] : item.answer; break;
      case 'radio': correctAnsText = item.options.find(o => o.value === item.answer)?.text || item.answer; break;
      case 'checkbox': correctAnsText = item.options.filter(o => item.answer.includes(o.value)).map(o => stripHTML(o.text)).join('; '); break;
      case 'truefalse': correctAnsText = item.answer ? 'Benar' : 'Salah'; break;
      case 'pairing': correctAnsText = item.pairs.map(p => stripHTML(p.left) + ' \u2194 ' + stripHTML(p.right)).join('; '); break;
      case 'order': correctAnsText = item.answer.map(idx => stripHTML(item.items[idx])).join(' \u2192 '); break;
      case 'dragdrop': correctAnsText = Object.values(item.answer).join(', '); break;
    }

    // Kolom pertanyaan: pertahankan LaTeX untuk KaTeX render
    const qHTML = smartTruncate(item.question, 90);
    // Kolom jawaban benar: pertahankan LaTeX
    const caHTML = smartTruncate(correctAnsText, 65);
    // Kolom jawaban siswa: plain text
    const saText = stripHTML(String(studentAns)).substring(0, 20);

    rows += '<tr>'
      +'<td style="padding:2px 3px;border:1px solid #aaa;text-align:center;font-size:8px;vertical-align:middle">'+(i+1)+'</td>'
      +'<td style="padding:2px 3px;border:1px solid #aaa;font-size:7.5px;line-height:1.35">'+qHTML+'</td>'
      +'<td style="padding:2px 3px;border:1px solid #aaa;text-align:center;font-size:7.5px;vertical-align:middle">'+esc(saText)+'</td>'
      +'<td style="padding:2px 3px;border:1px solid #aaa;font-size:7.5px;line-height:1.35">'+caHTML+'</td>'
      +'<td style="padding:2px 3px;border:1px solid #aaa;text-align:center;font-size:11px;vertical-align:middle;color:'+(isCorrect?'#16a34a':'#dc2626')+'">'+(isCorrect?'\u2713':'\u2717')+'</td>'
      +'</tr>';
  });

  // Tanggal format Indonesia
  const bulan = ['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];
  const dg = new Date();
  const dateStr = dg.getDate() + ' ' + bulan[dg.getMonth()] + ' ' + dg.getFullYear();

  const printHTML = '<!DOCTYPE html><html><head><meta charset="UTF-8">'
    +'<title>Hasil - '+esc(meta.title)+'</title>'
    +'<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">'
    +'<style>'
    +'@page{size:A4;margin:10mm 8mm}'
    +'*{margin:0;padding:0;box-sizing:border-box}'
    +'body{font-family:Arial,Helvetica,sans-serif;font-size:9px;color:#222;-webkit-print-color-adjust:exact;print-color-adjust:exact}'
    +'.hd{display:flex;flex-wrap:wrap;gap:0 16px;font-size:9px;line-height:1.5;margin-bottom:6px;padding-bottom:6px;border-bottom:1px solid #ccc}'
    +'.hd p{margin:0;white-space:nowrap}'
    +'.hd strong{font-weight:700}'
    +'.hd .title{font-size:13px;font-weight:700;width:100%;margin-bottom:2px}'
    +'.hd .score{font-size:11px;font-weight:700;color:#111}'
    +'table{width:100%;border-collapse:collapse;table-layout:fixed}'
    +'th{background:#e5e7eb;font-weight:700;padding:3px;border:1px solid #aaa;text-align:left;font-size:7px;text-transform:uppercase;letter-spacing:.4px}'
    +'td{padding:2px 3px;border:1px solid #aaa;vertical-align:top;overflow:hidden}'
    +'.c1{width:18px;text-align:center}'
    +'.c2{width:32%}'
    +'.c3{width:14%;text-align:center}'
    +'.c4{width:30%}'
    +'.c5{width:18px;text-align:center}'
    +'.sig{margin-top:10px;text-align:right;font-size:9px;line-height:1.4}'
    +'.sig p{margin:0}'
    +'.sig .line{margin-top:18px}'
    +'@media print{body{-webkit-print-color-adjust:exact;print-color-adjust:exact}}'
    +'</style>'
    +'</head><body>'
    +'<div class="hd">'
    +'<p class="title">MATH TUTORING by Deni</p>'
    +'<p>Name: <strong>'+esc(studentName)+'</strong></p>'
    +'<p>Date: '+dateStr+'</p>'
    +'<p>Topic: Perbandingan Senilai</p>'
    +'<p>Assessment Group: '+esc(meta.title)+'</p>'
    +'<p class="score">Score: '+correctCount+' / '+totalEx+'</p>'
    +'</div>'
    +'<table>'
    +'<thead><tr>'
    +'<th class="c1">No.</th>'
    +'<th class="c2">Question</th>'
    +'<th class="c3">Student Answer</th>'
    +'<th class="c4">Correct Answer</th>'
    +'<th class="c5">Note</th>'
    +'</tr></thead>'
    +'<tbody>'+rows+'</tbody>'
    +'</table>'
    +'<div class="sig">'
    +'<p>Checked by,</p>'
    +'<p class="line"><strong>Deni</strong></p>'
    +'</div>'
    +'<'+ 'script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"><' + '/script>'
    +'<'+ 'script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"><' + '/script>'
    +'<'+ 'script>'
    +'window.onload=function(){'
    +'renderMathInElement(document.body,{'
    +'delimiters:['
    +'{left:"$$",right:"$$",display:true},'
    +'{left:"$",right:"$",display:false},'
    +'{left:"\\\\(",right:"\\\\)",display:false},'
    +'{left:"\\\\[",right:"\\\\]",display:true}'
    +'],throwOnError:false'
    +'});'
    +'setTimeout(function(){window.print()},600);'
    +'};'
    +'</' + 'script>'
    +'</body></html>';

  const w = window.open('', '_blank');
  w.document.write(printHTML);
  w.document.close();
}

   INIT
   ========================================================== */
function init(){
  renderMap();
}

// Jalankan setelah DOM siap
if(document.readyState === 'loading'){
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}
