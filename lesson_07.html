<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perbandingan Berbalik Nilai - Math Tutoring</title>
    <!-- KaTeX CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6C5CE7;
            --secondary: #00CEC9;
            --accent: #FD79A8;
            --success: #00B894;
            --danger: #FF7675;
            --warning: #FDCB6E;
            --dark: #2D3436;
            --light: #DFE6E9;
            --bg: #F0F3F5;
            --card-bg: #FFFFFF;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg);
            color: var(--dark);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Translasi Bahasa Inggris */
        .trans {
            display: block;
            font-size: 0.85em;
            color: #636e72;
            font-style: italic;
            margin-top: 2px;
            font-weight: 400;
        }

        /* Navbar & Header */
        header {
            background: var(--card-bg);
            padding: 15px 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo {
            font-weight: 800;
            font-size: 1.2rem;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo svg {
            width: 32px;
            height: 32px;
        }

        .btn-reset-all {
            background: var(--danger);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
            font-size: 0.9rem;
        }

        .btn-reset-all:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 10px rgba(255, 118, 117, 0.4);
        }

        /* Main Layout */
        .main-container {
            display: flex;
            min-height: calc(100vh - 70px);
        }

        /* Duolingo Path Navigation */
        .path-nav {
            width: 300px;
            background: linear-gradient(180deg, #a8e6cf 0%, #dcedc1 100%);
            padding: 40px 20px;
            position: sticky;
            top: 70px;
            height: calc(100vh - 70px);
            overflow-y: auto;
            overflow-x: auto;
            border-right: 2px solid rgba(0,0,0,0.05);
        }

        .path-node {
            background: white;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            margin: 0 auto 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 5px 0 rgba(0,0,0,0.1), 0 10px 15px rgba(0,0,0,0.1);
            transition: transform 0.2s, box-shadow 0.2s;
            position: relative;
            border: 4px solid transparent;
        }

        .path-node:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 0 rgba(0,0,0,0.1), 0 12px 20px rgba(0,0,0,0.2);
        }

        .path-node.active {
            border-color: var(--primary);
            transform: scale(1.1);
            animation: bounce 2s infinite;
        }

        .path-node.completed {
            background: var(--success);
            color: white;
        }

        .path-node.completed svg {
            fill: white;
        }

        .path-node svg {
            width: 30px;
            height: 30px;
            fill: var(--dark);
        }

        .path-node::after {
            content: attr(data-title);
            position: absolute;
            left: 80px;
            top: 50%;
            transform: translateY(-50%);
            background: var(--dark);
            color: white;
            padding: 5px 10px;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 600;
            white-space: nowrap;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 10;
        }

        .path-node:hover::after {
            opacity: 1;
        }

        .path-connector {
            width: 4px;
            height: 40px;
            background: rgba(255,255,255,0.7);
            margin: -45px auto 5px;
            border-radius: 2px;
        }

        /* Content Area */
        .content-area {
            flex: 1;
            padding: 40px;
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
        }

        .section-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            display: none;
            animation: fadeIn 0.5s ease-in-out;
        }

        .section-card.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes bounce {
            0%, 100% { transform: scale(1.1); }
            50% { transform: scale(1.15); }
        }

        h1, h2, h3 {
            color: var(--dark);
            margin-bottom: 15px;
        }

        h2.section-title {
            font-size: 1.8rem;
            color: var(--primary);
            border-bottom: 3px solid var(--secondary);
            padding-bottom: 10px;
            margin-bottom: 30px;
            display: inline-block;
        }

        p {
            margin-bottom: 15px;
        }

        /* Theory & Exercise Blocks */
        .theory-block {
            background: #EBF5FB;
            border-left: 5px solid var(--secondary);
            padding: 20px;
            border-radius: 10px;
            margin: 30px 0;
        }

        .exercise-block {
            background: #FFFFFF;
            border: 2px solid var(--light);
            border-radius: 15px;
            padding: 25px;
            margin: 30px 0;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
            transition: border-color 0.3s;
        }

        .exercise-block:focus-within {
            border-color: var(--primary);
        }

        .exercise-question {
            font-weight: 600;
            margin-bottom: 15px;
            font-size: 1.1rem;
        }

        .math-inline {
            display: inline-block;
        }

        .exercise-input-group {
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }

        input[type="number"], input[type="text"] {
            padding: 12px 15px;
            border: 2px solid var(--light);
            border-radius: 10px;
            font-family: 'Poppins', sans-serif;
            font-size: 1rem;
            width: 150px;
            transition: 0.3s;
        }

        input[type="number"]:focus, input[type="text"]:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(108, 92, 231, 0.2);
        }

        .btn-check {
            background: var(--success);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
            box-shadow: 0 4px 0 #009688;
        }

        .btn-check:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 0 #009688;
        }

        .btn-check:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #009688;
        }

        .btn-nav {
            background: var(--light);
            color: var(--dark);
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
            margin-top: 20px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-nav:hover {
            background: var(--primary);
            color: white;
        }

        .btn-nav.prev {
            float: left;
        }
        .btn-nav.next, .btn-nav.reset {
            float: right;
            margin-left: 10px;
        }
        
        .btn-nav.reset {
            background: var(--danger);
            color: white;
        }

        /* Collapsible Explanation */
        .collapsible {
            margin-top: 20px;
            border-radius: 10px;
            overflow: hidden;
            display: none; /* Hidden by default */
        }

        .collapsible.active {
            display: block;
            animation: slideDown 0.3s ease-out;
        }

        @keyframes slideDown {
            from { opacity: 0; max-height: 0; }
            to { opacity: 1; max-height: 500px; }
        }

        .collapsible-header {
            background: var(--warning);
            padding: 15px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 600;
        }

        .collapsible-body {
            background: #FFFEF5;
            padding: 15px;
            border: 1px solid var(--warning);
            border-top: none;
        }

        .correct-feedback { color: var(--success); }
        .wrong-feedback { color: var(--danger); }

        /* Illustrations */
        .svg-illustration {
            display: block;
            margin: 20px auto;
            max-width: 200px;
            height: auto;
        }

        /* Print Layout (A4) */
        .print-area {
            display: none;
        }

        @media print {
            body * {
                visibility: hidden;
            }
            .print-area, .print-area * {
                visibility: visible;
            }
            .print-area {
                display: block;
                position: absolute;
                left: 0;
                top: 0;
                width: 210mm;
                min-height: 297mm;
                padding: 20mm;
                font-size: 12pt;
                color: black;
            }
            @page {
                size: A4;
                margin: 0;
            }
            
            .print-header {
                text-align: center;
                margin-bottom: 20px;
                border-bottom: 2px solid black;
                padding-bottom: 10px;
            }
            
            .print-info {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 10px;
                margin-bottom: 20px;
            }
            
            .print-table {
                width: 100%;
                border-collapse: collapse;
                margin-bottom: 20px;
            }
            
            .print-table th, .print-table td {
                border: 1px solid black;
                padding: 8px;
                text-align: left;
                font-size: 10pt;
            }
            
            .print-sign {
                margin-top: 40px;
                text-align: right;
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .path-nav {
                display: none; /* Simplify for mobile */
            }
            .content-area {
                padding: 20px;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="#6C5CE7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M2 17L12 22L22 17" stroke="#00CEC9" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M2 12L12 17L22 12" stroke="#FD79A8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            Math Tutoring by Deni
        </div>
        <button class="btn-reset-all" onclick="resetAllProgress()">Reset All Progress</button>
    </header>

    <div class="main-container">
        <!-- Path Navigation -->
        <nav class="path-nav" id="pathNav">
            <!-- Nodes will be injected here by JS -->
        </nav>

        <!-- Content Area -->
        <main class="content-area" id="contentArea">
            <!-- Section content will be injected here by JS -->
        </main>
    </div>

    <!-- Print Area Template -->
    <div class="print-area" id="printArea">
        <div class="print-header">
            <h2>MATH TUTORING by Deni</h2>
        </div>
        <div class="print-info">
            <p><strong>Name:</strong> ________________________</p>
            <p><strong>Date:</strong> ________________________</p>
            <p><strong>Topic:</strong> Perbandingan Berbalik Nilai</p>
            <p><strong>Assignment Group:</strong> <span id="printGroupName">-</span></p>
            <p><strong>Score:</strong> <span id="printScore">-</span> / 10</p>
        </div>
        <table class="print-table">
            <thead>
                <tr>
                    <th>No.</th>
                    <th>Question</th>
                    <th>Student Answer</th>
                    <th>Correct Answer</th>
                    <th>Note</th>
                </tr>
            </thead>
            <tbody id="printTableBody">
                <!-- Rows injected by JS -->
            </tbody>
        </table>
        <div class="print-sign">
            <p>Checked by,</p>
            <br><br><br>
            <p><strong>Deni</strong></p>
        </div>
    </div>

    <!-- KaTeX Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>

    <script>
        // --- DATA & STATE MANAGEMENT ---
        const LESSON_SECTIONS = [
            { id: 'rules', title: 'Class Rules', icon: 'rules' },
            { id: 'sec1', title: 'Spiral Review Warm-up', icon: 'warmup' },
            { id: 'sec2', title: 'Introduction', icon: 'intro' },
            { id: 'sec3', title: 'Prior Knowledge', icon: 'prior' },
            { id: 'sec4', title: 'Problem Introduction', icon: 'problem' },
            { id: 'sec5', title: 'Guided Practice', icon: 'guided' },
            { id: 'sec6', title: 'Independent Practice', icon: 'independent' },
            { id: 'assign1', title: 'Assignment 1', icon: 'assign1' },
            { id: 'assign2', title: 'Assignment 2', icon: 'assign2' },
            { id: 'assign3', title: 'Assignment 3', icon: 'assign3' },
            { id: 'assign4', title: 'Assignment 4', icon: 'assign4' },
            { id: 'assign5', title: 'Assignment 5', icon: 'assign5' },
            { id: 'consolidation', title: 'Consolidation', icon: 'final' }
        ];

        let userProgress = JSON.parse(localStorage.getItem('mathProgress')) || {};

        function saveProgress() {
            localStorage.setItem('mathProgress', JSON.stringify(userProgress));
        }

        function resetAllProgress() {
            if(confirm("Apakah Anda yakin ingin mereset SEMUA progress? (Are you sure you want to reset ALL progress?)")) {
                localStorage.removeItem('mathProgress');
                userProgress = {};
                location.reload();
            }
        }

        // --- RENDERING PATH ---
        function renderPath() {
            const pathNav = document.getElementById('pathNav');
            pathNav.innerHTML = '';
            
            LESSON_SECTIONS.forEach((sec, index) => {
                const node = document.createElement('div');
                node.className = 'path-node';
                node.dataset.id = sec.id;
                node.dataset.title = sec.title;
                
                if (userProgress[sec.id]) node.classList.add('completed');
                if (index === 0 || userProgress[LESSON_SECTIONS[index-1].id]) {
                    // accessible
                } else {
                    node.style.opacity = '0.5';
                }

                node.innerHTML = getIconSVG(sec.icon);
                node.onclick = () => showSection(sec.id);
                pathNav.appendChild(node);

                if (index < LESSON_SECTIONS.length - 1) {
                    const connector = document.createElement('div');
                    connector.className = 'path-connector';
                    pathNav.appendChild(connector);
                }
            });
        }

        function getIconSVG(name) {
            // Basic SVGs for nodes
            const icons = {
                rules: '<svg viewBox="0 0 24 24"><path d="M3 6h18M3 12h18M3 18h18"/></svg>',
                warmup: '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="5" fill="none" stroke="currentColor" stroke-width="2"/><path d="M12 1v3M12 20v3M4.22 4.22l2.12 2.12M17.66 17.66l2.12 2.12M1 12h3M20 12h3M4.22 19.78l2.12-2.12M17.66 6.34l2.12-2.12" stroke="currentColor" stroke-width="2" fill="none"/></svg>',
                intro: '<svg viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" fill="none" stroke="currentColor" stroke-width="2"/></svg>',
                prior: '<svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2zm0 18a8 8 0 1 1 8-8 8 8 0 0 1-8 8z" fill="none" stroke="currentColor" stroke-width="2"/><path d="M12 6v6l4 2" fill="none" stroke="currentColor" stroke-width="2"/></svg>',
                problem: '<svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z" fill="none" stroke="currentColor" stroke-width="2"/></svg>',
                guided: '<svg viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17a5 5 0 1 1 0-10 5 5 0 0 1 0 10zm0-8a3 3 0 1 0 0 6 3 3 0 0 0 0-6z" fill="none" stroke="currentColor" stroke-width="2"/></svg>',
                independent: '<svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-2 10h-4v4h-2v-4H7v-2h4V7h2v4h4v2z" fill="none" stroke="currentColor" stroke-width="2"/></svg>',
                assign1: '<svg viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z" fill="none" stroke="currentColor" stroke-width="2"/></svg>',
                assign2: '<svg viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm-4 12l-2-2 1.41-1.41L10 13.17l3.59-3.59L15 11l-5 5z" fill="none" stroke="currentColor" stroke-width="2"/></svg>',
                assign3: '<svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-9 14l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z" fill="none" stroke="currentColor" stroke-width="2"/></svg>',
                assign4: '<svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-2 10h-4v4h-2v-4H7v-2h4V7h2v4h4v2z" fill="none" stroke="currentColor" stroke-width="2"/></svg>',
                assign5: '<svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z" fill="none" stroke="currentColor" stroke-width="2"/></svg>',
                final: '<svg viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z" fill="none" stroke="currentColor" stroke-width="2"/></svg>'
            };
            return icons[name] || icons.rules;
        }

        // --- RENDERING CONTENT ---
        // This will be populated in subsequent parts
        const CONTENT_DATA = {}; 

        function renderMath(target) {
            if (typeof renderMathInElement === 'function') {
                renderMathInElement(target, {
                    delimiters: [
                        {left: '$$', right: '$$', display: true},
                        {left: '$', right: '$', display: false}
                    ],
                    throwOnError: false
                });
            } else {
                setTimeout(() => renderMath(target), 100);
            }
        }

        function showSection(id) {
            const contentArea = document.getElementById('contentArea');
            contentArea.innerHTML = '';
            
            const sectionData = CONTENT_DATA[id];
            if (!sectionData) return;

            const card = document.createElement('div');
            card.className = 'section-card active';
            card.innerHTML = sectionData.html;
            
            contentArea.appendChild(card);
            
            // Render Math with fallback
            renderMath(card);

            // Update path active state
            document.querySelectorAll('.path-node').forEach(n => n.classList.remove('active'));
            const activeNode = document.querySelector(`.path-node[data-id="${id}"]`);
            if (activeNode) activeNode.classList.add('active');

            // Scroll to top
            window.scrollTo(0, 0);
        }

        // --- EXERCISE LOGIC ---
        function checkAnswer(exId, correctAnswer, assignGroup = null) {
            const input = document.getElementById(`input-${exId}`);
            const userAns = input.value.trim();
            const feedback = document.getElementById(`feedback-${exId}`);
            const collapsible = document.getElementById(`collapse-${exId}`);
            
            if (!userAns) {
                alert("Silakan masukkan jawaban. (Please enter your answer.)");
                return;
            }

            const isCorrect = parseFloat(userAns) === parseFloat(correctAnswer);
            
            if (isCorrect) {
                feedback.innerHTML = "<span class='correct-feedback'>Benar! (Correct!)</span>";
                input.style.borderColor = "var(--success)";
                input.style.backgroundColor = "#E8F8F5";
                
                // Mark section as completed if it's not an assignment
                if (!assignGroup) {
                    const sectionId = exId.split('-')[0];
                    userProgress[sectionId] = true;
                    saveProgress();
                    renderPath();
                }
            } else {
                feedback.innerHTML = "<span class='wrong-feedback'>Belum tepat. Coba lagi atau lihat penjelasan. (Not quite right. Try again or see explanation.)</span>";
                input.style.borderColor = "var(--danger)";
            }
            
            collapsible.classList.add('active');
        }

        function resetExercise(exId) {
            const input = document.getElementById(`input-${exId}`);
            input.value = "";
            input.style.borderColor = "var(--light)";
            input.style.backgroundColor = "white";
            document.getElementById(`feedback-${exId}`).innerHTML = "";
            document.getElementById(`collapse-${exId}`).classList.remove('active');
        }

        function nextExercise(currentId, nextId) {
            if (nextId) {
                const nextEl = document.getElementById(`ex-${nextId}`);
                if (nextEl) {
                    nextEl.style.display = 'block'; // Tampilkan soal berikutnya
                    setTimeout(() => {
                        nextEl.scrollIntoView({behavior: 'smooth', block: 'center'});
                    }, 100);
                }
            } else {
                // Jika tidak ada nextId, cari tombol end section atau tombol submit
                const sectionId = currentId.split('-')[0]; // Perbaikan parsing ID
                const endEl = document.getElementById(`end-${sectionId}`);
                if (endEl) {
                    endEl.style.display = 'block';
                    endEl.scrollIntoView({behavior: 'smooth', block: 'center'});
                } else {
                    // Jika di Assignment (tidak ada endEl), scroll ke tombol Submit
                    const submitBtn = document.querySelector(`.section-card.active .btn-check[onclick^="submitAssignment"]`);
                    if (submitBtn) {

        let assignmentData = {};

        function checkAnswer(exId, correctAnswer, assignGroup = null) {
            const input = document.getElementById(`input-${exId}`);
            const userAns = input.value.trim();
            const feedback = document.getElementById(`feedback-${exId}`);
            const collapsible = document.getElementById(`collapse-${exId}`);
            
            if (!userAns) {
                alert("Silakan masukkan jawaban. (Please enter your answer.)");
                return;
            }

            const isCorrect = parseFloat(userAns) === parseFloat(correctAnswer);
            const groupMatch = exId.match(/(assign\d+)/);
            const currentGroup = assignGroup || (groupMatch ? groupMatch[1] : null);
            
            if (currentGroup) {
                if (!assignmentData[currentGroup]) assignmentData[currentGroup] = { score: 0, answers: {} };
                const wasCorrect = assignmentData[currentGroup].answers[exId];
                if (isCorrect && !wasCorrect) {
                    assignmentData[currentGroup].score++;
                } else if (!isCorrect && wasCorrect) {
                    assignmentData[currentGroup].score--;
                }
                assignmentData[currentGroup].answers[exId] = isCorrect;
            }
            
            if (isCorrect) {
                feedback.innerHTML = "<span class='correct-feedback'>Benar! (Correct!)</span>";
                input.style.borderColor = "var(--success)";
                input.style.backgroundColor = "#E8F8F5";
                
                if (!currentGroup) {
                    const sectionId = exId.split('-')[0] + '-' + exId.split('-')[1];
                    userProgress[sectionId] = true;
                    saveProgress();
                    renderPath();
                }
            } else {
                feedback.innerHTML = "<span class='wrong-feedback'>Belum tepat. Coba lagi atau lihat penjelasan. (Not quite right. Try again or see explanation.)</span>";
                input.style.borderColor = "var(--danger)";
            }
            collapsible.classList.add('active');
        }

        function resetExercise(exId) {
            const input = document.getElementById(`input-${exId}`);
            input.value = "";
            input.style.borderColor = "var(--light)";
            input.style.backgroundColor = "white";
            document.getElementById(`feedback-${exId}`).innerHTML = "";
            document.getElementById(`collapse-${exId}`).classList.remove('active');

            const groupMatch = exId.match(/(assign\d+)/);
            if (groupMatch) {
                const assignGroup = groupMatch[1];
                if (assignmentData[assignGroup] && assignmentData[assignGroup].answers[exId]) {
                    if (assignmentData[assignGroup].answers[exId] === true) {
                        assignmentData[assignGroup].score--;
                    }
                    delete assignmentData[assignGroup].answers[exId];
                }
            }
        }

        function preparePrint(groupId, score, total) {
            document.getElementById('printGroupName').innerText = groupId.toUpperCase();
            document.getElementById('printScore').innerText = `${score}/${total}`;
            
            const tbody = document.getElementById('printTableBody');
            tbody.innerHTML = '';
            
            const exercises = document.querySelectorAll(`.exercise-block[id^="ex-${groupId}"]`);
            
            exercises.forEach((ex, index) => {
                const exId = ex.id.replace('ex-', '');
                const questionEl = ex.querySelector('.exercise-question');
                let questionText = questionEl ? questionEl.textContent.replace(/\s+/g, ' ').trim() : 'N/A';
                
                const input = document.getElementById(`input-${exId}`);
                const studentAns = input.value || '-';
                
                const btn = ex.querySelector('.btn-check');
                const onclickStr = btn.getAttribute('onclick');
                const match = onclickStr.match(/checkAnswer\('([^']+)',\s*([^)]+)\)/);
                const correctAns = match ? match[2] : '-';
                
                const isCorrect = parseFloat(studentAns) === parseFloat(correctAns);
                
                const row = `
                    <tr>
                        <td>${index + 1}</td>
                        <td>${questionText}</td>
                        <td>${studentAns}</td>
                        <td>${correctAns}</td>
                        <td style="text-align: center;">${isCorrect ? '✓' : '✗'}</td>
                    </tr>
                `;
                tbody.insertAdjacentHTML('beforeend', row);
            });
            
            window.print();
        }
